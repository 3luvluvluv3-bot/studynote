<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>Example</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#fff;color:#1C1916;padding:32px;max-width:720px;margin:0 auto}h1{font-size:22px;font-weight:700;margin-bottom:18px}.tb{display:flex;gap:8px;margin-bottom:14px}button{padding:7px 13px;border-radius:6px;border:1px solid #E0E0E0;background:transparent;color:#6A635A;font-size:12px;cursor:pointer;font-family:Arial,sans-serif}button:hover{background:#F5F5F5}.card{border:none;margin-bottom:0}.h{display:flex;align-items:flex-start;gap:10px;padding:10px 0;cursor:pointer;border-bottom:1px solid #E0E0E0}.n{font-size:11px;color:#A09890;min-width:16px;margin-top:3px;font-weight:500}.s{font-size:15px;line-height:1.75;flex:1}.ch{font-size:10px;color:#A09890;margin-top:5px;transition:transform .2s}.ch.open{transform:rotate(90deg)}.b{padding:10px 0 14px 26px;display:none}.b.open{display:block}.tr{font-size:13px;line-height:1.8;color:#6A635A;margin-bottom:10px}.dv{height:1px;background:#E0E0E0;margin:10px 0}.ws{display:flex;flex-direction:column;gap:6px}.wr{display:flex;gap:8px;align-items:baseline}.tg{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#EEF1FA;color:#2D4A8C;white-space:nowrap}.df{font-size:12px;color:#6A635A}</style></head><body><h1>Example</h1><div class="tb"><button onclick="ea()">모두 펼치기</button><button onclick="ca()">모두 접기</button></div><script>function t(i){const b=document.getElementById('b'+i),c=document.getElementById('c'+i);const o=b.classList.toggle('open');c.classList.toggle('open',o);}function ea(){document.querySelectorAll('.b').forEach(b=>b.classList.add('open'));document.querySelectorAll('.ch').forEach(c=>c.classList.add('open'));}function ca(){document.querySelectorAll('.b').forEach(b=>b.classList.remove('open'));document.querySelectorAll('.ch').forEach(c=>c.classList.remove('open'));}</script></body></html>
